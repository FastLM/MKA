model_name_or_path: meta-llama/Llama-3.1-8B
batch_size: 1
seq_len: 2048
lr: 1.0e-5
max_steps: 20
bf16: true
tp_size: 1

mka_patch:
  enabled: true
  mode: fastmka
  use_l3: false
  ema_beta: 0.9
  use_cuda_kernel: true
  prefer_sdpa: true
  verbose: true

memory_hierarchy:
  l1_onchip_tiles: true
  l2_hbm_tensor_path: true
  l3_dram_chunk_recall: false
  l3_recall_top_r: 0
  host_dram_staging: false
  host_dram_pinned: false
  ssd_spill_path: null
  measure_prefill_decode_separately: true
  notes: "Prefill/decode: bench_inference_metrics.py; training tok/s: train_hf_patch.py."
