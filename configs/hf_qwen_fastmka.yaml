model_name_or_path: Qwen/Qwen2.5-7B
batch_size: 1
seq_len: 2048
lr: 1.0e-5
max_steps: 20
bf16: true
tp_size: 1

mka_patch:
  enabled: true
  mode: fastmka
  use_l3: false
  ema_beta: 0.9
  use_cuda_kernel: true
  prefer_sdpa: true
  verbose: true

# Block-MKA tier mapping (paper §4.2): L1 on-chip tiles, L2 HBM, L3 DRAM chunk recall.
# FastMKA: fused L1/L2/(L3) → single KV then attention (see Algorithm 2 in paper).
memory_hierarchy:
  l1_onchip_tiles: true
  l2_hbm_tensor_path: true
  l3_dram_chunk_recall: false
  l3_recall_top_r: 0
  host_dram_staging: false
  host_dram_pinned: false
  ssd_spill_path: null
  measure_prefill_decode_separately: true
  notes: "Prefill/decode: scripts/bench_inference_metrics.py; training tok/s: train_hf_patch.py. Nsight for HBM BW (paper Table 5)."
